name: Cross-Platform Build

on:
  push:
    branches: [master, main, feat/unified-app-v2]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_ext: .exe
          - os: macos-latest
            platform: macos
            artifact_ext: ''
          - os: ubuntu-latest
            platform: linux
            artifact_ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows'
        run: pip install -r requirements-windows.txt

      - name: Install dependencies (Unix)
        if: matrix.platform != 'windows'
        run: pip install -r requirements.txt

      - name: Build Unified App
        run: python build/build.py unified

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrainReservationApp-${{ matrix.platform }}
          path: dist/TrainReservationApp${{ matrix.artifact_ext }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mkdir release
          mv artifacts/TrainReservationApp-windows/TrainReservationApp.exe release/TrainReservationApp-windows.exe
          mv artifacts/TrainReservationApp-macos/TrainReservationApp release/TrainReservationApp-macos
          mv artifacts/TrainReservationApp-linux/TrainReservationApp release/TrainReservationApp-linux

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
